<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murdoku 推理謎盤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#1A1A2E;color:#EAEAEA;height:100vh;overflow:hidden}
.game-container{display:grid;grid-template-columns:560px 1fr 180px;height:100vh}
.left-panel{background:#16213E;padding:14px;overflow-y:auto;border-right:1px solid #2a2a4e}
.logo{font-size:22px;font-weight:700;color:#E94560;margin-bottom:4px}
.timer{font-size:28px;font-weight:600;color:#FFC107;margin-bottom:8px;font-variant-numeric:tabular-nums}
.puzzle-title{font-size:18px;font-weight:600;margin-bottom:8px;color:#53A8B6}
.general-clue{background:#0F3460;border-radius:8px;padding:10px;margin-bottom:12px;font-size:14px;color:#9E9E9E;line-height:1.4}
.section-title{font-size:16px;font-weight:600;color:#FFC107;margin-bottom:6px}
.suspects-list{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.suspect-row{background:#0F3460;border:2px solid transparent;border-radius:6px;padding:8px;cursor:pointer;transition:all .2s;user-select:none;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.suspect-row:hover{border-color:#53A8B6}
.suspect-row.selected{border-color:#FFC107;background:#1a2a4e;box-shadow:0 0 8px rgba(255,193,7,.3)}
.suspect-row.placed{opacity:.4}
.suspect-row .avatar{width:80px;height:80px;min-width:80px;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.suspect-row .info{text-align:center}
.suspect-row .name{font-size:16px;font-weight:600;margin-bottom:3px}
.suspect-row .clue{font-size:15px;color:#9E9E9E;line-height:1.3}
.suspect-row.selected .clue{color:#FFC107}
.keyword{border-bottom:1px dashed #FFC107;cursor:help;position:relative}
.keyword:hover .kw-tooltip{display:block}
.kw-tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #FFC107;border-radius:6px;padding:6px 10px;font-size:13px;color:#FFC107;min-width:140px;max-width:220px;word-wrap:break-word;white-space:normal;z-index:10;pointer-events:none;text-align:center;margin-bottom:4px}
.center-panel{display:flex;align-items:center;justify-content:center;padding:16px;background:#1A1A2E;position:relative}
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:3px solid #666}
.cell{width:95px;height:95px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;border:1px solid #333;user-select:none}
.cell:hover{filter:brightness(1.2)}
.cell.region-客廳{background:url('assets/scene-apartment/terrain-wood-floor.png') center/cover}
.cell.region-書房{background:url('assets/scene-apartment/terrain-wood-floor.png') center/cover}
.cell.region-花園{background:url('assets/common/terrain-grass.png') center/cover}
.cell.region-廚房{background:url('assets/scene-apartment/terrain-tile.png') center/cover}
.cell.blocked{cursor:not-allowed}
.cell.blocked:hover{filter:none}
.cell .decoration{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3;pointer-events:auto;cursor:help;font-size:76px;opacity:1}
.cell .decoration img{width:80%;height:80%;object-fit:contain;opacity:0.9}
.cell .decoration::after{content:attr(data-tip);display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #FFC107;border-radius:4px;padding:3px 8px;font-size:12px;color:#FFC107;white-space:nowrap;z-index:20;pointer-events:none}
.cell .decoration:hover::after{display:block}
.cell .region-tag{position:absolute;bottom:4px;left:4px;font-size:21px;font-weight:700;color:#fff;z-index:6;background:rgba(0,0,0,0.5);padding:1px 6px;border-radius:4px;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.cell .placed-suspect{font-size:28px;font-weight:700}
.cell .placed-name{font-size:11px;margin-top:2px}
.cell .notes{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;position:relative;z-index:5}
.cell .note{font-size:30px;font-weight:700;background:rgba(255,193,7,.15);color:#FFC107;padding:1px 4px;border-radius:3px}
.cell .x-mark{position:absolute;font-size:42px;color:rgba(0,0,0,.6);font-weight:700;pointer-events:none;z-index:4}
.cell .auto-x{position:absolute;font-size:36px;color:rgba(0,0,0,.6);font-weight:700;pointer-events:none;z-index:4}
.cell.error{box-shadow:inset 0 0 0 3px #E94560}
.cell.correct{box-shadow:inset 0 0 0 3px #4CAF50}
.cell.row-conflict{box-shadow:inset 0 0 0 2px #ff6b6b}
.cell.border-top{border-top:3px solid #888}
.cell.border-bottom{border-bottom:3px solid #888}
.cell.border-left{border-left:3px solid #888}
.cell.border-right{border-right:3px solid #888}
.press-ring{position:absolute;inset:10%;width:80%;height:80%;z-index:10;pointer-events:none;transform:scaleX(-1)}
.press-ring circle{fill:none;stroke:#4CAF50;stroke-width:6;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transform:rotate(-90deg);transform-origin:center;animation:fill-ring 500ms linear forwards}
@keyframes fill-ring{to{stroke-dashoffset:0}}
.press-ring.slow circle{animation-duration:1000ms}
.right-panel{background:#16213E;padding:10px;display:flex;flex-direction:column;gap:10px;border-left:1px solid #2a2a4e}
.tool-btn{background:#0F3460;border:1px solid #2a2a4e;border-radius:6px;padding:10px;text-align:center;cursor:pointer;font-size:16px;color:#EAEAEA;transition:all .2s;user-select:none;position:relative;overflow:hidden}
.tool-btn:hover{border-color:#53A8B6}
.tool-btn.active{border-color:#FFC107;background:#2a1a0e;color:#FFC107}
.submit-btn{margin-top:auto;background:#E94560;color:#fff;border:none;border-radius:6px;padding:14px 8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.submit-btn.disabled{background:#333;cursor:not-allowed;color:#666}
.submit-btn:hover:not(.disabled){box-shadow:0 4px 12px rgba(233,69,96,.4)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.overlay.show{display:flex}
.overlay h1{font-size:40px;margin-bottom:12px}
.overlay .reveal{font-size:20px;color:#E94560;margin-bottom:8px}
.overlay .story{font-size:14px;color:#9E9E9E;margin-bottom:16px;max-width:400px}
.overlay .time-display{font-size:16px;color:#FFC107;margin-bottom:20px}
.overlay button{background:#53A8B6;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer}
.error-toast{position:fixed;top:20px;right:20px;background:#E94560;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;display:none;z-index:50}
.home-container{max-width:960px;margin:0 auto;padding:24px;min-height:100vh}
.home-header{text-align:center;margin-bottom:24px}
.home-logo{font-size:32px;font-weight:700;color:#E94560}
.home-subtitle{color:#9E9E9E;font-size:16px;margin-top:8px}
.home-filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.filter-pill{padding:6px 16px;border-radius:20px;border:1px solid #444;background:transparent;color:#EAEAEA;cursor:pointer;font-size:14px;transition:all .2s}
.filter-pill.active{background:#53A8B6;border-color:#53A8B6;color:#fff}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,280px));gap:16px}
.puzzle-card{background:#16213E;border-radius:12px;overflow:hidden;transition:transform 0.2s;cursor:default}
.puzzle-card:hover{transform:translateY(-4px)}
.puzzle-card .card-scene{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#16213E,#0F3460) center/cover;display:flex;align-items:center;justify-content:center;font-size:48px;background-size:cover;background-position:center}
.puzzle-card .card-body{padding:16px}
.puzzle-card .card-title{font-size:16px;font-weight:600;margin-bottom:8px;color:#EAEAEA}
.puzzle-card .card-meta{font-size:13px;color:#9E9E9E;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.puzzle-card .diff-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;color:#fff}
.puzzle-card .card-status{font-size:12px;color:#9E9E9E;margin-bottom:12px}
.puzzle-card .card-btn{display:block;width:100%;padding:10px;background:#53A8B6;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:background .2s}
.puzzle-card .card-btn:hover{background:#3d8a96}
</style>
</head>
<body>
<div id="home-page">
  <div class="home-container">
    <div class="home-header">
      <div class="home-logo">🔍 Murdoku 推理謎盤</div>
      <p class="home-subtitle">閱讀線索，用邏輯推理找出兇手</p>
    </div>
    <div class="home-filters">
      <span class="filter-pill active" onclick="filterDiff('all')">全部</span>
      <span class="filter-pill" onclick="filterDiff('簡單')">簡單</span>
      <span class="filter-pill" onclick="filterDiff('中等')">中等</span>
      <span class="filter-pill" onclick="filterDiff('困難')">困難</span>
      <span class="filter-pill" onclick="filterDiff('專家')">專家</span>
    </div>
    <div class="home-grid" id="puzzle-grid"></div>
  </div>
</div>
<div id="game-page" style="display:none">
<div class="game-container">
  <div class="left-panel">
    <div class="logo">🔍 Murdoku 推理謎盤</div>
    <div class="timer" id="timer">00:00</div>
    <div class="puzzle-title">珠寶失竊案（困難 6×6）</div>
    <div class="general-clue">📋 規則：<br>• 每<span class="keyword">行<span class="kw-tooltip">一橫排格子</span></span>只能放一人<br>• 每<span class="keyword">列<span class="kw-tooltip">一豎列格子</span></span>只能放一人<br>• 找出與 Victor 獨處在同一區域的兇手<br><small>操作：點選人物→點格筆記 / 長按格放置</small></div>
    <div class="section-title">嫌疑人與線索</div>
    <div class="suspects-list" id="suspects"></div>
  </div>
  <div class="center-panel"><div class="board" id="board"></div></div>
  <div class="right-panel">
    <div class="tool-btn" onclick="confirmExit()">← 退出</div>
    <div class="tool-btn" onclick="undo()">↩ 撤銷</div>
    <div class="tool-btn" id="btn-x" onclick="toggleXMode()">✖ 標記排除</div>
    <div class="tool-btn" id="btn-eraser" onclick="toggleEraserMode()">🧹 清除</div>
    <div class="tool-btn" id="clear-btn" onmousedown="startClear()" onmouseup="endClear()" ontouchstart="startClear()" ontouchend="endClear()">🗑 清除全部<br><small style="color:#9E9E9E;font-size:12px">（長按）</small></div>
    <div class="tool-btn" onclick="showHelp()">❓ 玩法</div>
    <button class="submit-btn disabled" id="btn-submit" onclick="submitAnswer()">提交<br><small>（請先放置所有人）</small></button>
  </div>
</div>
<div class="overlay" id="overlay">
  <h1>🎉 破案成功！</h1>
  <div class="reveal" id="murderer-text"></div>
  <div class="story" id="story-text"></div>
  <div class="time-display" id="result-time"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button onclick="document.getElementById('overlay').classList.remove('show');goHome()" style="background:#53A8B6;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer">回到謎題列表</button>
    <button onclick="resetGame()" style="background:#53A8B6;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer">重新開始</button>
    <button id="btn-next" onclick="goNext()" style="background:#E94560;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;display:none">下一關</button>
  </div>
</div>
<div class="error-toast" id="error-toast">有放置錯誤，請檢查紅色標記的格子</div>
</div><!-- end game-page -->

<script>
const PUZZLE={
  gridSize:6,
  regions:{'客廳':{cells:[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]]},'書房':{cells:[[0,3],[0,4],[0,5],[1,3],[1,4],[1,5]]},'花園':{cells:[[2,0],[2,1],[2,2],[3,0],[3,1],[3,2],[4,0],[4,1],[4,2],[5,0],[5,1],[5,2]]},'廚房':{cells:[[2,3],[2,4],[2,5],[3,3],[3,4],[3,5],[4,3],[4,4],[4,5],[5,3],[5,4],[5,5]]}},
  // Region label positions: one cell per region to show the name
  regionLabels:{客廳:[0,0],書房:[0,5],花園:[5,0],廚房:[5,4]},
  decorations:[],
  blocked:[{r:4,c:1,name:"雕像",img:"assets/scene-museum/item-statue.png"},{r:5,c:4,name:"壁爐",img:"assets/scene-apartment/item-fireplace.png",wide:true},{r:5,c:5,name:"壁爐",img:null},{r:1,c:2,name:"花瓶",img:"assets/scene-apartment/item-vase.png"},{r:3,c:4,name:"冰箱",img:"assets/scene-apartment/item-fridge.png"}],
  suspects:[
    {id:"A",name:"Adam",color:"#E63946",img:"assets/avatars/suspect-male-01.png",clue:'Adam 在第 5 <span class="keyword">列<span class="kw-tooltip">一豎列格子</span></span>'},
    {id:"B",name:"Beth",color:"#457B9D",img:"assets/avatars/suspect-female-01.png",clue:'Beth 跟花瓶<span class="keyword">相鄰<span class="kw-tooltip">左側、右側、上方或下方，且在同一區域內</span></span>，且<span class="keyword">獨自<span class="kw-tooltip">該人所在的區域內沒有其他人</span></span>待著'},
    {id:"C",name:"Carl",color:"#2A9D8F",img:"assets/avatars/suspect-male-02.png",clue:'Carl 在廚房，在 Diana 的<span class="keyword">北邊<span class="kw-tooltip">上方的任何格子（跨區域）</span></span>'},
    {id:"D",name:"Diana",color:"#E9C46A",img:"assets/avatars/suspect-female-02.png",clue:'Diana 跟冰箱<span class="keyword">相鄰<span class="kw-tooltip">左側、右側、上方或下方，且在同一區域內</span></span>，在 Carl 的西邊'},
    {id:"E",name:"Eric",color:"#8338EC",img:"assets/avatars/suspect-male-03.png",clue:'Eric 在 Victor 的<span class="keyword">北邊<span class="kw-tooltip">上方的任何格子（跨區域）</span></span>'},
    {id:"V",name:"Victor",color:"#808080",img:"assets/avatars/suspect-male-04.png",clue:'Victor 在第 3 <span class="keyword">列<span class="kw-tooltip">一豎列格子</span></span>（被害者）'}
  ],
  solution:{A:[0,4],B:[1,1],C:[2,5],D:[3,3],E:[4,0],V:[5,2]},
  murderer:"E",murdererName:"Eric",
  story:"Eric 在花園與 Victor 獨處，趁夜色掩護犯下了罪行！",
  terrainOverrides:{"1,4":"assets/scene-apartment/terrain-carpet.png","1,5":"assets/scene-apartment/terrain-carpet.png","3,1":"assets/common/terrain-stone-path.png","5,1":"assets/common/terrain-stone-path.png"}
};
const TOTAL=6;

let state={selected:null,xMode:false,eraserMode:false,placements:{},notes:{},xMarks:{},autoX:{},history:[],startTime:Date.now(),solved:false};

function ck(r,c){return`${r},${c}`}
function getRegion(r,c){for(const[n,reg] of Object.entries(PUZZLE.regions)){if(reg.cells.some(([rr,cc])=>rr===r&&cc===c))return n}return null}
function isBlocked(r,c){return PUZZLE.blocked.some(b=>b.r===r&&b.c===c)}
function getDecoration(r,c){return PUZZLE.decorations.find(d=>d.r===r&&d.c===c)}
function regionBorders(r,c){const reg=getRegion(r,c);let cls=[];if(r>0&&getRegion(r-1,c)!==reg)cls.push('border-top');if(r<5&&getRegion(r+1,c)!==reg)cls.push('border-bottom');if(c>0&&getRegion(r,c-1)!==reg)cls.push('border-left');if(c<5&&getRegion(r,c+1)!==reg)cls.push('border-right');return cls.join(' ')}
function isRegionLabel(r,c){for(const[n,pos] of Object.entries(PUZZLE.regionLabels)){if(pos[0]===r&&pos[1]===c)return n}return null}

// Auto-X: mark row/col when someone is placed + clear notes
function computeAutoX(){
  const ax={};
  for(const[key,sid] of Object.entries(state.placements)){
    const[r,c]=key.split(',').map(Number);
    for(let i=0;i<6;i++){
      const rk=ck(r,i),ck2=ck(i,c);
      if(rk!==key&&!state.placements[rk]){ax[rk]=true;if(state.notes[rk])state.notes[rk]=[]}
      if(ck2!==key&&!state.placements[ck2]){ax[ck2]=true;if(state.notes[ck2])state.notes[ck2]=[]}
    }
  }
  state.autoX=ax;
}

function getConflicts(){
  const conflicts=new Set();
  const byRow={},byCol={};
  for(const[key] of Object.entries(state.placements)){
    const[r,c]=key.split(',').map(Number);
    if(!byRow[r])byRow[r]=[];byRow[r].push(key);
    if(!byCol[c])byCol[c]=[];byCol[c].push(key);
  }
  for(const cells of Object.values(byRow)){if(cells.length>1)cells.forEach(k=>conflicts.add(k))}
  for(const cells of Object.values(byCol)){if(cells.length>1)cells.forEach(k=>conflicts.add(k))}
  return conflicts;
}

function render(){computeAutoX();renderSuspects();renderBoard();updateSubmit()}
function renderSuspects(){
  document.getElementById('suspects').innerHTML=PUZZLE.suspects.map(s=>{
    const placed=Object.values(state.placements).includes(s.id);
    const sel=state.selected===s.id;
    return`<div class="suspect-row ${sel?'selected':''} ${placed?'placed':''}" onclick="selectSuspect('${s.id}')">
      <div class="avatar"><img src="${s.img}" style="width:100%;height:100%;object-fit:cover;border-radius:4px"></div>
      <div class="info"><div class="name">${s.name}</div><div class="clue">${s.clue}</div></div></div>`;
  }).join('');
}
function renderBoard(){
  const conflicts=getConflicts();
  const board=document.getElementById('board');let html='';
  for(let r=0;r<6;r++){for(let c=0;c<6;c++){
    const key=ck(r,c);const reg=getRegion(r,c);const blocked=isBlocked(r,c);
    const deco=getDecoration(r,c);const placed=state.placements[key];
    const notes=state.notes[key]||[];const hasX=state.xMarks[key];
    const hasAutoX=state.autoX[key]&&!placed;
    const borders=regionBorders(r,c);const suspect=placed?PUZZLE.suspects.find(s=>s.id===placed):null;
    const conflict=conflicts.has(key)?'row-conflict':'';
    const regLabel=isRegionLabel(r,c);
    let content='';
    if(regLabel)content+=`<div class="region-tag">${regLabel}</div>`;
    if(deco)content+=`<div class="decoration" data-tip="${deco.name}">${deco.icon}</div>`;
    if(blocked){const b=PUZZLE.blocked.find(b=>b.r===r&&b.c===c);if(b.img){content+=`<div class="decoration" data-tip="${b.name||''}">${b.wide?`<img src="${b.img}" style="width:160%;height:80%;position:absolute;left:10%">`:`<img src="${b.img}">`}</div>`}else if(b.img===null){/* blocked but no image */}else{content+=`<div class="decoration" data-tip="${b.name||''}">${b.icon||''}</div>`}}
    if(hasX)content+=`<div class="x-mark">✕</div>`;
    else if(hasAutoX&&!blocked)content+=`<div class="auto-x">✕</div>`;
    if(suspect)content+=`<img src="${suspect.img}" style="width:80%;height:80%;object-fit:cover;border-radius:4px;position:relative;z-index:5"><div style="position:absolute;bottom:2px;right:4px;font-size:22px;font-weight:700;color:${suspect.color};z-index:6;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000">${suspect.id}</div>`;
    else if(!blocked&&notes.length>0)content+=`<div class="notes">${notes.map(n=>{const s=PUZZLE.suspects.find(x=>x.id===n);return`<span class="note" style="color:${s.color}">${s.id}</span>`}).join('')}</div>`;
    const terrainUrl=PUZZLE.terrainOverrides&&PUZZLE.terrainOverrides[key];const terrainStyle=terrainUrl?`style="background:url('${terrainUrl}') center/cover"`:'';
    html+=`<div class="cell region-${reg} ${blocked?'blocked':''} ${borders} ${conflict}" id="cell-${key}" ${terrainStyle} onclick="cellClick(${r},${c})" onmousedown="cellDown(${r},${c})" onmouseup="cellUp()" ontouchstart="cellDown(${r},${c})" ontouchend="cellUp()">${content}</div>`;
  }}
  board.innerHTML=html;
}

function selectSuspect(id){if(state.solved)return;if(state.xMode){state.xMode=false;document.getElementById('btn-x').classList.remove('active')}if(state.eraserMode){state.eraserMode=false;document.getElementById('btn-eraser').classList.remove('active')}state.selected=state.selected===id?null:id;render()}
function toggleXMode(){if(state.solved)return;state.xMode=!state.xMode;if(state.xMode){state.selected=null;state.eraserMode=false;document.getElementById('btn-eraser').classList.remove('active')}document.getElementById('btn-x').classList.toggle('active',state.xMode);render()}
function toggleEraserMode(){if(state.solved)return;state.eraserMode=!state.eraserMode;if(state.eraserMode){state.selected=null;state.xMode=false;document.getElementById('btn-x').classList.remove('active')}document.getElementById('btn-eraser').classList.toggle('active',state.eraserMode);render()}

let pressTimer=null;let pressCell=null;
function cellDown(r,c){if(state.solved||isBlocked(r,c))return;if(!state.selected)return;const key=ck(r,c);const el=document.getElementById('cell-'+key);if(el){const svg=document.createElement('div');svg.innerHTML='<svg class="press-ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg>';el.appendChild(svg.firstChild);pressCell=el}pressTimer=setTimeout(()=>{removePressRing();placeSuspect(r,c);pressTimer=null},500)}
function cellUp(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null}removePressRing()}
function removePressRing(){if(pressCell){const ring=pressCell.querySelector('.press-ring');if(ring)ring.remove();pressCell=null}}
function cellClick(r,c){
  if(state.solved||isBlocked(r,c))return;const key=ck(r,c);
  if(state.eraserMode){pushHistory();if(state.placements[key])delete state.placements[key];state.notes[key]=[];delete state.xMarks[key];render();saveState();return}
  if(state.xMode){pushHistory();if(state.xMarks[key])delete state.xMarks[key];else{state.xMarks[key]=true;state.notes[key]=[]}render();saveState();return}
  if(!state.selected)return;if(state.placements[key])return;
  pushHistory();if(!state.notes[key])state.notes[key]=[];
  const idx=state.notes[key].indexOf(state.selected);
  if(idx>=0)state.notes[key].splice(idx,1);else state.notes[key].push(state.selected);
  render();saveState();
}
function placeSuspect(r,c){
  if(!state.selected)return;const key=ck(r,c);pushHistory();
  for(const k of Object.keys(state.placements)){if(state.placements[k]===state.selected)delete state.placements[k]}
  // Clear this person's notes from ALL cells
  for(const k of Object.keys(state.notes)){
    const idx=state.notes[k].indexOf(state.selected);
    if(idx>=0)state.notes[k].splice(idx,1);
  }
  state.placements[key]=state.selected;state.notes[key]=[];delete state.xMarks[key];
  render();saveState();
}

function undo(){if(state.solved||!state.history.length)return;const prev=state.history.pop();state.placements=prev.p;state.notes=prev.n;state.xMarks=prev.x;render();saveState()}
let clearT=null;
function startClear(){const btn=document.getElementById('clear-btn');if(btn){const svg=document.createElement('div');svg.innerHTML='<svg class="press-ring slow" viewBox="0 0 100 100" style="inset:20%;width:60%;height:60%"><circle cx="50" cy="50" r="45"/></svg>';btn.appendChild(svg.firstChild)}clearT=setTimeout(()=>{removeClearRing();if(state.solved)return;pushHistory();state.placements={};state.notes={};state.xMarks={};render();saveState()},1000)}
function endClear(){if(clearT){clearTimeout(clearT);clearT=null}removeClearRing()}
function removeClearRing(){const btn=document.getElementById('clear-btn');if(btn){const ring=btn.querySelector('.press-ring');if(ring)ring.remove()}}
function pushHistory(){state.history.push({p:{...state.placements},n:JSON.parse(JSON.stringify(state.notes)),x:{...state.xMarks}});if(state.history.length>50)state.history.shift()}

function updateSubmit(){
  const btn=document.getElementById('btn-submit');const count=Object.keys(state.placements).length;
  const ready=count>=TOTAL;btn.classList.toggle('disabled',!ready);
  btn.innerHTML=ready?'🔍 提交答案':`提交<br><small style="font-size:12px">（已放 ${count}/${TOTAL}）</small>`;
}
function submitAnswer(){
  if(document.getElementById('btn-submit').classList.contains('disabled'))return;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('error','correct'));
  let allCorrect=true;
  for(const s of PUZZLE.suspects){
    const sol=PUZZLE.solution[s.id];const solKey=ck(sol[0],sol[1]);
    const entry=Object.entries(state.placements).find(([k,v])=>v===s.id);
    if(entry&&entry[0]===solKey)document.getElementById(`cell-${solKey}`).classList.add('correct');
    else{if(entry)document.getElementById(`cell-${entry[0]}`).classList.add('error');allCorrect=false}
  }
  if(allCorrect){
    state.solved=true;const elapsed=Math.floor((Date.now()-state.startTime)/1000);
    const prev=JSON.parse(localStorage.getItem('mrd_puzzle_apartment-medium-1')||'{}');
    const best=prev.bestTime?Math.min(prev.bestTime,elapsed):elapsed;
    localStorage.setItem('mrd_puzzle_apartment-medium-1',JSON.stringify({status:'completed',bestTime:best}));
    document.getElementById('murderer-text').textContent=`兇手是：${PUZZLE.murdererName}！`;
    document.getElementById('story-text').textContent=PUZZLE.story;
    document.getElementById('result-time').textContent=`破案時間：${Math.floor(elapsed/60)}分${elapsed%60}秒`;
    setTimeout(()=>{document.getElementById('overlay').classList.add('show');const hasNext=PUZZLES.some(p=>{const sv=localStorage.getItem('mrd_puzzle_'+p.id);const st=sv?JSON.parse(sv).status:'not_started';return st!=='completed'&&p.id!=='apartment-medium-1'});document.getElementById('btn-next').style.display=hasNext?'inline-block':'none'},600);
    localStorage.removeItem('murdoku_save');
  }else{const t=document.getElementById('error-toast');t.style.display='block';setTimeout(()=>t.style.display='none',3000)}
}
function showHelp(){alert("【玩法】\n1. 點選左側嫌疑人\n2. 點格子 = 筆記（再點取消）\n3. 長按格子 = 放置\n4. ✖按鈕 = 標記排除模式\n5. 全部放完後按提交\n\n【規則】\n• 每行每列只能放一人\n• 灰點 = 已被佔的行/列\n• 紅框 = 行列衝突警告\n• 找出與 Victor 獨處同區域的兇手")}
function confirmExit(){goHome()}
function resetGame(){localStorage.removeItem('murdoku_save');state={selected:null,xMode:false,eraserMode:false,placements:{},notes:{},xMarks:{},autoX:{},history:[],startTime:Date.now(),solved:false};document.getElementById('overlay').classList.remove('show');document.querySelectorAll('.cell').forEach(c=>c.classList.remove('error','correct','row-conflict'));render()}

setInterval(()=>{if(state.solved)return;const e=Math.floor((Date.now()-state.startTime)/1000);document.getElementById('timer').textContent=`${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`},1000);
function saveState(){localStorage.setItem('murdoku_save',JSON.stringify({p:state.placements,n:state.notes,x:state.xMarks,t:state.startTime,s:state.solved}));if(!state.solved&&(Object.keys(state.placements).length>0||Object.keys(state.notes).length>0))localStorage.setItem('mrd_puzzle_apartment-medium-1',JSON.stringify({status:'in_progress'}))}
function loadState(){const raw=localStorage.getItem('murdoku_save');if(raw){try{const d=JSON.parse(raw);state.placements=d.p||{};state.notes=d.n||{};state.xMarks=d.x||{};state.startTime=d.t||Date.now();state.solved=d.s||false}catch(e){}}}
loadState();render();

// Tooltip overflow fix
document.addEventListener('mouseover',function(e){
  const kw=e.target.closest('.keyword');
  if(!kw)return;
  const tip=kw.querySelector('.kw-tooltip');
  if(!tip)return;
  tip.style.left='50%';tip.style.transform='translateX(-50%)';
  requestAnimationFrame(()=>{
    const rect=tip.getBoundingClientRect();
    if(rect.right>window.innerWidth){tip.style.left='auto';tip.style.right='0';tip.style.transform='none'}
    else if(rect.left<0){tip.style.left='0';tip.style.transform='none'}
  });
});

// === HOMEPAGE ===
const PUZZLES=[
  {id:"apartment-medium-1",name:"珠寶失竊案",scene:"住家公寓",icon:"🏠",difficulty:"中等",diffColor:"#457B9D",size:"6×6",suspects:5,thumbnail:"assets/thumbnails/apartment-medium-1.png"}
];

let currentDiffFilter='all';

function renderHomePage(){
  const grid=document.getElementById('puzzle-grid');
  if(!grid)return;
  let html='';
  PUZZLES.forEach(p=>{
    if(currentDiffFilter!=='all'&&p.difficulty!==currentDiffFilter)return;
    const save=localStorage.getItem('mrd_puzzle_'+p.id);
    let status='未開始',btnText='開始',bestTime='';
    if(save){
      const d=JSON.parse(save);
      if(d.status==='completed'){status='✅ 已完成';btnText='重玩';if(d.bestTime)bestTime=' | 最佳：'+Math.floor(d.bestTime/60)+'分'+d.bestTime%60+'秒'}
      else if(d.status==='in_progress'){status='🔄 進行中';btnText='繼續'}
    }
    html+=`<div class="puzzle-card">
      <div class="card-scene" style="${p.thumbnail?`background:url('${p.thumbnail}') center/cover`:''}">${p.thumbnail?'':p.icon}</div>
      <div class="card-body">
        <div class="card-title">${p.name}</div>
        <div class="card-meta"><span class="diff-tag" style="background:${p.diffColor}">${p.difficulty}</span><span>${p.size}</span><span>${p.suspects}人</span></div>
        <div class="card-status">${status}${bestTime}</div>
        <button class="card-btn" onclick="startPuzzle('${p.id}')">${btnText}</button>
      </div>
    </div>`;
  });
  grid.innerHTML=html;
}

function filterDiff(diff){
  currentDiffFilter=diff;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  renderHomePage();
}

function startPuzzle(id){
  document.getElementById('home-page').style.display='none';
  document.getElementById('game-page').style.display='';
  state.startTime=Date.now();
  render();
}

function goHome(){
  saveState();
  document.getElementById('game-page').style.display='none';
  document.getElementById('home-page').style.display='';
  renderHomePage();
}

function goNext(){
  document.getElementById('overlay').classList.remove('show');
  // placeholder: currently only one puzzle
}

renderHomePage();
</script>
